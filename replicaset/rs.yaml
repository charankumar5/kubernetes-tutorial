apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-rs
  labels:
    env: dev  # another example (app: dev) # key: value are customised and our wish to define.
spec:
  replicas: 3
  selector:
    matchLabels:
      env: dev # another example (app: dev) # key: value are customised and our wish to define.
  template:
    metadata:
      name: nginx-rs
      labels:
        env: dev
        type: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80