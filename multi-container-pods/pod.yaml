apiVersion:  v1
kind: Pod
metadata:
  name: init-container
  labels:
    app: myapp
spec:
  containers:
    - name: myapp-container
      image: busybox:latest
      command: ['sh', '-c', 'echo the app is running && sleep 3600']
      env:
        - name: FIRSTNAME
          value: "test"
  initContainers:
    - name: myapp-initcontainer
      image: busybox:latest
      command: ['sh', '-c']
      args: ['until nslookup myservice.default.svc.cluster.local; do echo waiting for the service to up and running;sleep 2; done']